name: Go 多平台构建发布

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号（例如：v1.2.3）"
        required: true
        type: string

jobs:
  build:
    name: 构建 ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-go
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version-file: backend-go/go.mod
          cache-dependency-path: backend-go/go.sum

      - name: 解析版本号
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: 编译二进制文件
        shell: bash
        run: |
          mkdir -p dist
          BIN_NAME="xisu-backend_${{ steps.vars.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags "-s -w -X main.Version=${{ steps.vars.outputs.version }}" -o "dist/${BIN_NAME}" ./cmd/server

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.goos }}-${{ matrix.goarch }}
          path: backend-go/dist/*
          if-no-files-found: error

  release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: backend-*
          path: release-artifacts
          merge-multiple: true

      - name: 创建或更新发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          name: 发布 ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-artifacts/*
